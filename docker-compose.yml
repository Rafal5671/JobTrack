services:
  postgres:
    image: docker.io/postgres:16
    container_name: jobtrack-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: docker.io/axllent/mailpit
    container_name: jobtrack-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./jobtrack-api
      dockerfile: Dockerfile
    image: localhost/jobtrack_api
    container_name: jobtrack-api
    env_file:
      - ./jobtrack-api/.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./jobtrack-api/templates:/app/templates

  client:
    build:
      context: ./jobtrack-client
      dockerfile: Dockerfile
    image: localhost/jobtrack_client
    container_name: jobtrack-client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
