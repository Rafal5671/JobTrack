<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>JobTrack Reminder</title>
    </head>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f4f4f5;
            font-family:
                -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
                sans-serif;
        "
    >
        <table
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="padding: 40px 0"
        >
            <tr>
                <td align="center">
                    <table
                        width="560"
                        cellpadding="0"
                        cellspacing="0"
                        style="
                            background: #ffffff;
                            border-radius: 12px;
                            overflow: hidden;
                            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
                        "
                    >
                        <!-- Header -->
                        <tr>
                            <td style="background: #1a1a2e; padding: 32px 40px">
                                <p
                                    style="
                                        margin: 0;
                                        font-size: 22px;
                                        font-weight: 700;
                                        color: #ffffff;
                                        letter-spacing: -0.5px;
                                    "
                                >
                                    📋 JobTrack
                                </p>
                                <p
                                    style="
                                        margin: 6px 0 0;
                                        font-size: 13px;
                                        color: #9ca3af;
                                    "
                                >
                                    Your job search assistant
                                </p>
                            </td>
                        </tr>

                        <!-- Body -->
                        <tr>
                            <td style="padding: 36px 40px">
                                <p
                                    style="
                                        margin: 0 0 8px;
                                        font-size: 13px;
                                        font-weight: 600;
                                        color: #6366f1;
                                        text-transform: uppercase;
                                        letter-spacing: 0.05em;
                                    "
                                >
                                    Reminder
                                </p>
                                <h1
                                    style="
                                        margin: 0 0 24px;
                                        font-size: 24px;
                                        font-weight: 700;
                                        color: #111827;
                                        line-height: 1.3;
                                    "
                                >
                                    {{.ReminderTitle}}
                                </h1>

                                <!-- Company card -->
                                <table
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    style="
                                        background: #f9fafb;
                                        border: 1px solid #e5e7eb;
                                        border-radius: 8px;
                                        margin-bottom: 24px;
                                    "
                                >
                                    <tr>
                                        <td style="padding: 16px 20px">
                                            <p
                                                style="
                                                    margin: 0 0 4px;
                                                    font-size: 12px;
                                                    color: #6b7280;
                                                    font-weight: 500;
                                                    text-transform: uppercase;
                                                    letter-spacing: 0.05em;
                                                "
                                            >
                                                Company
                                            </p>
                                            <p
                                                style="
                                                    margin: 0;
                                                    font-size: 18px;
                                                    font-weight: 600;
                                                    color: #111827;
                                                "
                                            >
                                                {{.Company}}
                                            </p>
                                        </td>
                                    </tr>
                                </table>

                                <!-- Due date -->
                                <table
                                    width="100%"
                                    cellpadding="0"
                                    cellspacing="0"
                                    style="
                                        background: #eff6ff;
                                        border: 1px solid #bfdbfe;
                                        border-radius: 8px;
                                        margin-bottom: 32px;
                                    "
                                >
                                    <tr>
                                        <td style="padding: 14px 20px">
                                            <p
                                                style="
                                                    margin: 0;
                                                    font-size: 13px;
                                                    color: #1d4ed8;
                                                "
                                            >
                                                🗓 Due:
                                                <strong>{{.DueAt}}</strong>
                                            </p>
                                        </td>
                                    </tr>
                                </table>

                                <p
                                    style="
                                        margin: 0;
                                        font-size: 14px;
                                        color: #6b7280;
                                        line-height: 1.6;
                                    "
                                >
                                    Don't forget to follow up on your
                                    application. Good luck with your job search!
                                </p>
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td
                                style="
                                    background: #f9fafb;
                                    border-top: 1px solid #e5e7eb;
                                    padding: 20px 40px;
                                "
                            >
                                <p
                                    style="
                                        margin: 0;
                                        font-size: 12px;
                                        color: #9ca3af;
                                        text-align: center;
                                    "
                                >
                                    This email was sent by JobTrack · You can
                                    manage your reminders in the app
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
